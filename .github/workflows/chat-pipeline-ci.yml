name: Chat streaming pipeline (Python)

on:
  push:
    paths:
      - "chat_pipeline/**"
      - "terraform/requirements.txt"
      - ".github/workflows/chat-pipeline-ci.yml"
  pull_request:
    paths:
      - "chat_pipeline/**"
      - "terraform/requirements.txt"
      - ".github/workflows/chat-pipeline-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat_pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68,<82" wheel
          # Beam 2.57 metadata needs pkg_resources; pip's isolated build env can miss it without this pin.
          pip install -e ".[gcp,dev]" --no-build-isolation
      - name: Pytest
        run: pytest -q
